apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-flask-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-flask-api
  template:
    metadata:
      labels:
        app: my-flask-api
    spec:
      containers:
        - name: my-flask-api
          image: YOUR_DOCKERHUB_USER/my-flask-api:latest
          ports:
            - containerPort: 5000
            