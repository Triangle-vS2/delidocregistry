<!--  This will create a convenient form for the user  -->
{% extends "valid_template.html" %}
{% block bodyText %}
    <div style="max-width: 600px; margin: 20px auto;">
        <h2>👥 Contacts</h2>
        <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
            <tr style="background: #f5f5f5;"><th>ID</th><th>Name</th></tr>
            {% for contact in contacts %}
            <tr style="border-bottom: 1px solid #ddd;">
                <td style="padding: 8px;">{{ contact.id }}</td>
                <td style="padding: 8px;">{{ contact.name }}</td>
            </tr>
            {% endfor %}
        </table>
        <input name="item" placeholder="Name" style="padding:8px;flex:2;min-width:200px;" required>
    </div>
{% endblock %}
